site_name: dftax
site_description: A differentiable Kohn-Sham DFT engine in pure JAX
repo_url: https://github.com/andresguzco/dftax
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - toc.integrate
    - header.autohide
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    logo: material/atom

extra_css:
  - _static/custom.css
extra_javascript:
  - _static/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - toc:
      permalink: "¤"
      toc_depth: 4

nav:
  - Home: index.md
  - All of dftax: all-of-dftax.md
  - Examples:
      - Introductory:
          - A first calculation: examples/water.ipynb
          - An open-shell radical: examples/open-shell.ipynb
          - Analytic forces: examples/forces.ipynb
      - Advanced:
          - Geometry optimization: examples/geometry-optimization.ipynb
          - Conformer batches: examples/conformers.ipynb
          - Multi-GPU execution: examples/multi-gpu.ipynb
      - Features:
          - Density fitting & streaming: examples/density-fitting.ipynb
          - Properties, dipole to IR: examples/properties.ipynb
          - Implicit differentiation: examples/implicit-diff.ipynb
  - Guides:
      - Coulomb backends: tutorials/coulomb-backends.md
      - Forces: tutorials/forces.md
      - Batched evaluation: tutorials/batched.md
      - Properties: tutorials/properties.md
      - Implicit differentiation: tutorials/implicit-diff.md
  - API reference:
      - Building a calculation: api/build.md
      - Grid specs: api/grids.md
      - Coulomb backends: api/coulomb.md
      - Solvers and results: api/solvers.md
      - Forces and properties: api/forces-properties.md
      - Batched evaluation: api/batched.md
      - Multi-device execution: api/multi-device.md
      - Functionals: api/functionals.md
      - Integrals and GTO: api/integrals.md
  - Misc:
      - FAQ: faq.md
      - Tips: tips.md

plugins:
  - search
  - ipynb
  - hippogriffe:
      extra_public_objects:
        - jax.Array
        - equinox.Module
        - optax.GradientTransformation
  - mkdocstrings:
      handlers:
        python:
          options:
            force_inspection: true
            heading_level: 4
            members_order: source
            show_bases: false
            show_if_no_docstring: true
            show_root_heading: true
            show_signature_annotations: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
