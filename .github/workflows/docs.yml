name: Deploy docs

# Builds the mkdocs site and publishes it to the gh-pages branch on every push to
# main. Enable GitHub Pages once (Settings -> Pages -> Source: gh-pages branch) so
# https://andresguzco.github.io/dftax/ serves it. PRs only build (in ci.yml), they
# do not deploy.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "dftax/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          cache-dependency-glob: "pyproject.toml"
      - name: Sync (docs deps)
        run: uv sync --extra docs
      - name: Doc coverage (every public symbol rendered)
        run: uv run python scripts/docs/check_coverage.py
      - name: Deploy to gh-pages
        run: uv run mkdocs gh-deploy --force   # strict via mkdocs.yml
